<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SignalOPs | Admin Metrics</title>
  <meta name="description" content="SignalOPs admin founder metrics dashboard." />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="kicker">Private Admin</p>
        <h1>Feature Metric Trends</h1>
        <p class="sub">All feature datapoints over time in compact metric cards.</p>
      </div>
      <div class="topbar-actions">
        <button id="refreshBtn" class="btn" type="button">Refresh</button>
        <a class="btn ghost" href="/dashboard/">Open dashboard</a>
      </div>
    </header>

    <p id="status" class="status">Loading metrics...</p>

    <section class="panel controls">
      <h2>Window</h2>
      <div class="range-actions" id="rangeActions">
        <button class="range-btn active" type="button" data-days="30">30 days</button>
        <button class="range-btn" type="button" data-days="60">60 days</button>
        <button class="range-btn" type="button" data-days="90">90 days</button>
      </div>
      <p class="meta" id="windowMeta"></p>
    </section>

    <section class="charts-grid" id="chartsGrid">
      <article class="chart-card" data-key="total_revenue">
        <h3>Total Revenue</h3>
        <strong id="value-total_revenue">-</strong>
        <canvas id="chart-total_revenue" width="360" height="130"></canvas>
      </article>
      <article class="chart-card" data-key="order_count">
        <h3>Order Count</h3>
        <strong id="value-order_count">-</strong>
        <canvas id="chart-order_count" width="360" height="130"></canvas>
      </article>
      <article class="chart-card" data-key="customer_count">
        <h3>Customer Count</h3>
        <strong id="value-customer_count">-</strong>
        <canvas id="chart-customer_count" width="360" height="130"></canvas>
      </article>
      <article class="chart-card" data-key="revenue_per_user">
        <h3>Revenue Per User</h3>
        <strong id="value-revenue_per_user">-</strong>
        <canvas id="chart-revenue_per_user" width="360" height="130"></canvas>
      </article>
      <article class="chart-card" data-key="purchase_frequency">
        <h3>Purchase Frequency</h3>
        <strong id="value-purchase_frequency">-</strong>
        <canvas id="chart-purchase_frequency" width="360" height="130"></canvas>
      </article>
      <article class="chart-card" data-key="repeat_rate">
        <h3>Repeat Rate</h3>
        <strong id="value-repeat_rate">-</strong>
        <canvas id="chart-repeat_rate" width="360" height="130"></canvas>
      </article>
      <article class="chart-card" data-key="refund_rate">
        <h3>Refund Rate</h3>
        <strong id="value-refund_rate">-</strong>
        <canvas id="chart-refund_rate" width="360" height="130"></canvas>
      </article>
      <article class="chart-card" data-key="week_over_week_revenue_change_pct">
        <h3>WoW Revenue Change</h3>
        <strong id="value-week_over_week_revenue_change_pct">-</strong>
        <canvas id="chart-week_over_week_revenue_change_pct" width="360" height="130"></canvas>
      </article>
    </section>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
