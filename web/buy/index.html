<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SignalOPs | Checkout</title>
  <meta name="description" content="SignalOPs secure checkout page." />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="shell">
    <div class="kicker">SignalOPs Purchase Flow</div>
    <h1>Secure checkout</h1>
    <p class="lead">
      Complete your subscription securely with our payment partner.
      Your plan will be activated after payment verification.
    </p>

    <section class="panel">
      <strong id="planLabel">Selected plan: Starter ($29/mo)</strong>
      <div class="meta" id="planMeta">Plan key: starter</div>
    </section>

    <div class="actions">
      <button class="btn" id="checkoutBtn" type="button" aria-disabled="true">Continue to checkout</button>
      <a class="btn ghost" href="/v1/#pricing">Back to pricing</a>
      <a class="btn ghost" id="accountBtn" href="/login/#register">Create account</a>
    </div>

    <p class="status" id="statusText">Checking buy API readiness...</p>
    <div class="activation-badge is-hidden" id="activationBadge" aria-live="polite"></div>
  </main>

  <script src="https://checkout.flutterwave.com/v3.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
